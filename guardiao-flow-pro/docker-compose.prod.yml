version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: ${DB_USER:-guardiaoflow}
      POSTGRES_PASSWORD: ${DB_PASS:-guardiaoflow_pass}
      POSTGRES_DB: guardiaoflow
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardiaoflow -d guardiaoflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-guardiaoflow}:${DB_PASS:-guardiaoflow_pass}@db:5432/guardiaoflow
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      REDIS_URL: redis://redis:6379/0
      ENV: ${ENV:-production}
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://localhost:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    expose:
      - 8000
    ports:
      - "8000:8000"

  celery_worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-guardiaoflow}:${DB_PASS:-guardiaoflow_pass}@db:5432/guardiaoflow
      REDIS_URL: redis://redis:6379/0
      ENV: ${ENV:-production}
    depends_on:
      - db
      - redis
    restart: always

  celery_beat:
    build: .
    command: celery -A app.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-guardiaoflow}:${DB_PASS:-guardiaoflow_pass}@db:5432/guardiaoflow
      REDIS_URL: redis://redis:6379/0
      ENV: ${ENV:-production}
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: always

volumes:
  pg_data:
