services:
  - type: web
    name: guardiao-flow
    env: python
    plan: free
    region: sao-paulo
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT wsgi:application
    envVars:
      - key: PORT
        value: 5001
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: TIMEOUT_MORADOR
        value: 30
      - key: FLASK_ENV
        value: production
